<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! </title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* === BASE STYLES & VARIABLES === */
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe6ea 0%, #fdfbfb 100%);
            --text-main: #5a3e4c;
            --accent-pink: #ff8fb3;
            --accent-dark: #e84393;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --shadow: 0 8px 32px rgba(232, 67, 147, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Background Floating Hearts */
        .floating-hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
        }

        .heart-shape {
            position: absolute; bottom: -10%;
            width: 20px; height: 20px;
            background: #ffb8c6; transform: rotate(45deg);
            animation: floatUp linear infinite; opacity: 0.5;
        }
        .heart-shape::before, .heart-shape::after {
            content: ''; position: absolute;
            width: 20px; height: 20px;
            background: #ffb8c6; border-radius: 50%;
        }
        .heart-shape::before { top: -10px; left: 0; }
        .heart-shape::after { top: 0; left: -10px; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(45deg) scale(1); opacity: 0.7; }
            100% { transform: translateY(-110vh) rotate(45deg) scale(1.5); opacity: 0; }
        }

        /* === WELCOME SCREEN (For Autoplay Bypass) === */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--bg-gradient);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1s ease;
        }
        
        .gift-btn {
            font-family: 'Dancing Script', cursive; font-size: 2.5rem;
            padding: 15px 40px; background: #fff; color: var(--accent-dark);
            border: 3px solid var(--accent-pink); border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 143, 179, 0.4);
            transition: 0.4s; animation: pulse 2s infinite;
        }
        .gift-btn:hover { background: var(--accent-pink); color: #fff; transform: scale(1.05); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 143, 179, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 143, 179, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 143, 179, 0); }
        }

        /* === FLOATING AUDIO CONTROLS === */
        #mute-btn {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--glass-bg); border: 2px solid var(--glass-border);
            border-radius: 50%; width: 55px; height: 55px;
            font-size: 1.5rem; cursor: pointer; z-index: 2000;
            box-shadow: var(--shadow); backdrop-filter: blur(5px); transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        #mute-btn:hover { background: #fff; transform: scale(1.1); }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%;
            background: var(--glass-bg); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; gap: 15px; z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            flex-wrap: nowrap; overflow-x: auto;
            -webkit-overflow-scrolling: touch; align-items: center;
        }
        nav::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) { nav { justify-content: center; overflow-x: hidden; gap: 25px; } }

        nav a {
            text-decoration: none; color: var(--accent-dark);
            font-weight: 600; font-size: 1rem; transition: 0.3s;
            padding: 8px 16px; border-radius: 20px;
            white-space: nowrap; background: rgba(255, 255, 255, 0.4);
        }
        nav a:hover { background: var(--accent-pink); color: white; }

        section {
            min-height: 100vh; padding: 100px 15px 60px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        h1, h2 {
            font-family: 'Dancing Script', cursive; color: var(--accent-dark);
            text-align: center; margin-bottom: 25px; font-size: 3rem;
            text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8);
        }

        .container {
            background: var(--glass-bg); padding: 30px 20px;
            border-radius: 30px; box-shadow: var(--shadow);
            max-width: 850px; width: 100%;
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
        }

        @media (min-width: 768px) { .container { padding: 50px; } h1, h2 { font-size: 3.5rem; } }

        /* === 1. LETTER SECTION (WIDER & TALLER FOR TYPEWRITER) === */
        #letter .container { max-width: 1000px; width: 95%; } /* Made specifically wider */
        
        .letter-content {
            font-size: 1.15rem; line-height: 2.2;
            white-space: pre-wrap; color: #4a3340;
            padding: 40px 25px; background: rgba(255, 255, 255, 0.8);
            border-radius: 20px; border: 2px dashed var(--accent-pink);
            position: relative; min-height: 550px; /* Taller box */
            text-align: left; font-weight: 400;
        }
        @media (min-width: 768px) { .letter-content { padding: 50px 40px; font-size: 1.25rem; min-height: 450px; } }
        
        .letter-content::before {
            content: ''; position: absolute; top: -20px; left: 20px;
            font-size: 2rem; background: white; border-radius: 50%;
            padding: 5px; box-shadow: 0 4px 10px rgba(232, 67, 147, 0.2);
        }

        .cursor {
            display: inline-block; width: 3px; height: 1.1em;
            background-color: var(--accent-dark); vertical-align: middle;
            animation: blink 0.7s infinite; margin-left: 2px;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* === 2. MAP SECTION === */
        .map-container {
            width: 100%; height: 300px; background: #f0f8ff; border-radius: 20px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 3px solid white; box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }
        @media (min-width: 768px) { .map-container { height: 350px; } }
        .map-svg { width: 100%; height: 100%; }
        .city-label { font-weight: 600; font-size: 14px; fill: #5a3e4c; font-family: 'Poppins', sans-serif; }
        .animated-line { stroke: var(--accent-dark); stroke-width: 4; stroke-dasharray: 10px; fill: none; animation: dash 20s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -1000; } }
        .plane { font-size: 24px; offset-path: path('M 100 200 Q 400 50 700 200'); animation: flyPlane 5s ease-in-out infinite alternate; position: absolute; top: -12px; left: -12px; }
        @keyframes flyPlane { 0% { offset-distance: 0%; transform: scaleX(1); } 100% { offset-distance: 100%; transform: scaleX(1); } }

        /* === 3. QUIZ SECTION === */
        .quiz-option {
            display: block; width: 100%; padding: 15px; margin: 12px 0;
            background: white; color: var(--text-main); border: 2px solid var(--accent-pink);
            border-radius: 15px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .quiz-option:hover { background: var(--accent-pink); color: white; transform: translateX(5px); }
        #quiz-result { margin-top: 25px; font-weight: bold; font-size: 1.5rem; text-align: center; color: var(--accent-dark); font-family: 'Dancing Script', cursive; }

        /* === 4. LOVE METER === */
        .meter-container { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .meter-container input { padding: 15px; border: 2px solid var(--accent-pink); border-radius: 15px; font-size: 1rem; outline: none; text-align: center; background: rgba(255,255,255,0.9); width: 100%; max-width: 300px; }
        .btn { padding: 12px 35px; background: linear-gradient(45deg, var(--accent-pink), var(--accent-dark)); color: white; border: none; border-radius: 25px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(232, 67, 147, 0.3); width: 100%; max-width: 250px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(232, 67, 147, 0.5); }
        .heart-result { font-size: 3.5rem; text-align: center; margin-top: 20px; display: none; color: var(--accent-dark); animation: heartbeat 1s infinite alternate; font-family: 'Dancing Script', cursive; }

        /* === 5. ALBUM SECTION === */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; }
        @media (min-width: 768px) { .gallery { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; } }
        .polaroid { background: white; padding: 10px 10px 25px 10px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); border-radius: 8px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .polaroid:nth-child(even) { transform: rotate(3deg); } .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:hover { transform: scale(1.1) rotate(0deg); z-index: 10; box-shadow: 0 15px 30px rgba(232, 67, 147, 0.3); }
        .polaroid img { width: 100%; height: 160px; object-fit: cover; border-radius: 5px; background-color: #ffe4e1; }

        /* === 6. MUSIC PLAYER === */
        .player-box { text-align: center; background: white; padding: 20px; border-radius: 20px; border: 2px solid var(--accent-pink); }
        .track-list { list-style: none; margin-top: 25px; max-height: 250px; overflow-y: auto; border-radius: 10px; padding: 10px; background: #fffafa; text-align: left; }
        .track-list li { padding: 12px; cursor: pointer; border-bottom: 1px dashed var(--accent-pink); transition: 0.3s; font-weight: 500; font-size: 0.95rem; }
        .track-list li:hover, .track-list li.playing { background: var(--accent-pink); color: white; border-radius: 10px; border-bottom: none; transform: scale(1.02); }
        audio { width: 100%; margin-top: 20px; border-radius: 30px; outline: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--accent-pink); border-radius: 10px; }
    </style>
</head>
<body>

    <audio id="global-music" src="2.mp3" loop preload="auto"></audio>

    <div id="welcome-screen">
        <h1 style="font-size: 3.5rem; color: var(--accent-dark); text-align: center; padding: 0 20px;">A Special Gift For You</h1>
        <button class="gift-btn" onclick="startExperience()">Open Your Gift </button>
    </div>

    <button id="mute-btn" onclick="toggleMute()" title="Toggle Background Music"></button>

    <div class="floating-hearts" id="hearts-container"></div>

    <nav>
        <a href="#letter"> Letter</a>
        <a href="#map"> Journey</a>
        <a href="#quiz"> Quiz</a>
        <a href="#meter"> Bond</a>
        <a href="#album"> Memories</a>
        <a href="#music"> Music</a>
    </nav>

    <section id="letter">
        <div class="container">
            <h2>A Special Note...</h2>
            <div class="letter-content" id="myLetter"></div>
        </div>
    </section>

    <section id="map">
        <div class="container">
            <h2>Our Journey</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #777; font-size: 1rem; font-style: italic;">"Distance means so little when someone means so much."</p>
            <div class="map-container">
                <svg viewBox="0 0 800 400" class="map-svg" preserveAspectRatio="xMidYMid meet">
                    <path d="M 100 200 Q 400 50 700 200" class="animated-line" />
                    <circle cx="100" cy="200" r="10" fill="var(--accent-dark)" />
                    <text x="60" y="240" class="city-label">Ahmedabad</text>
                    <circle cx="700" cy="200" r="10" fill="var(--accent-dark)" />
                    <text x="680" y="240" class="city-label">Patna</text>
                </svg>
                <div class="plane"></div>
            </div>
        </div>
    </section>

    <section id="quiz">
        <div class="container">
            <h2>How Well Do You Know Me?</h2>
            <div id="quiz-container">
                <h3 id="question-text" style="margin-bottom: 25px; text-align:center; font-size: 1.1rem; line-height: 1.5;"></h3>
                <div id="options-container"></div>
            </div>
            <div id="quiz-result"></div>
        </div>
    </section>

    <section id="meter">
        <div class="container">
            <h2>Our Bond Meter</h2>
            <div class="meter-container">
                <input type="text" id="name1" placeholder="Your Name" />
                <input type="text" id="name2" value="Jatin" readonly style="background: #f0f0f0;" />
            </div>
            <div style="text-align: center;">
                <button class="btn" onclick="calculateLove()">Calculate Bond</button>
            </div>
            <div class="heart-result" id="loveResult"></div>
        </div>
    </section>

    <section id="album">
        <div class="container" style="max-width: 1000px;">
            <h2>Our Beautiful Memories</h2>
            <div class="gallery" id="photoGallery">
                </div>
        </div>
    </section>

    <section id="music">
        <div class="container">
            <h2>Your Playlist</h2>
            <div class="player-box">
                <h3 id="current-track-title" style="color: var(--accent-dark); font-family: 'Dancing Script', cursive; font-size: 1.8rem;">Select a song...</h3>
                <audio id="audio-player" controls>Your browser does not support the audio element.</audio>
                <ul class="track-list" id="playlist">
                    </ul>
            </div>
        </div>
    </section>

    <script>
        // --- 1. BACKGROUND FLOATING HEARTS ---
        const heartsContainer = document.getElementById('hearts-container');
        for(let i=0; i<15; i++) {
            let heart = document.createElement('div');
            heart.className = 'heart-shape';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heartsContainer.appendChild(heart);
        }

        // --- 2. AUDIO MANAGEMENT ---
        const globalMusic = document.getElementById('global-music');
        const mainPlayer = document.getElementById('audio-player');
        const muteBtn = document.getElementById('mute-btn');
        let isGlobalMutedByUser = false;

        function startExperience() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; }, 1000);
            globalMusic.play().catch(e => console.log("Autoplay blocked."));
        }

        function toggleMute() {
            if (globalMusic.paused) {
                globalMusic.play(); isGlobalMutedByUser = false; muteBtn.innerHTML = '';
            } else {
                globalMusic.pause(); isGlobalMutedByUser = true; muteBtn.innerHTML = '';
            }
        }

        mainPlayer.addEventListener('play', () => { if (!globalMusic.paused) { globalMusic.pause(); muteBtn.innerHTML = ''; } });
        mainPlayer.addEventListener('pause', () => { if (!isGlobalMutedByUser) { globalMusic.play(); muteBtn.innerHTML = ''; } });
        mainPlayer.addEventListener('ended', () => { if (!isGlobalMutedByUser) { globalMusic.play(); muteBtn.innerHTML = ''; } });

        // --- 3. TYPEWRITER LOGIC (Human Speed + Extended Text) ---
        const fullLetterText = `Hey beta, happiest birthday! \n\nIt's me, your Jatin.\n\nLove you soo soo soo much! You are so incredibly special to me. The distance between Ahmedabad and Patna is just a physical barrier, because in my heart, you are always right here with me. Sending you lots of love and the warmest hugs from afar.\n\nTere aane se meri zindagi mein jo raunak aayi hai, use shabdon mein bayaan karna mushkil hai. Tum mere din ka wo hissa ho jiske bina mera har din adhoora lagta hai.\n\nNo matter how much we fight or how much I love roasting you, you mean the absolute world to me. You are my constant, my favorite person, and the most beautiful soul I know.\n\nDua hai ki tumhare chehre ki yeh pyari si muskurahat kabhi kam na ho, aur tumhare saare sapne poore hon. Rab kare tumhein duniya ki saari khushiyan milen.\n\nEnjoy your special day to the fullest. I am always there for you, today and forever. `;

        const letterElement = document.getElementById('myLetter');
        let charIndex = 0;
        let isTypingStarted = false;

        function typeWriter() {
            if (charIndex < fullLetterText.length) {
                let char = fullLetterText.charAt(charIndex);
                if (char === '\n') {
                    letterElement.innerHTML += '<br>';
                } else {
                    letterElement.innerHTML += char;
                }
                charIndex++;
                
                // Human-like typing speed logic
                let speed = Math.random() * 40 + 20; // Normal typing speed: 20ms - 60ms
                if (char === '.' || char === ',' || char === '!' || char === '\n') {
                    speed = Math.random() * 300 + 200; // Pause at punctuation: 200ms - 500ms
                }
                setTimeout(typeWriter, speed);
            } else {
                // Add blinking cursor at the end
                letterElement.innerHTML += '<span class="cursor"></span>';
            }
        }

        // Only start typing when the user scrolls to the letter section
        const letterObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isTypingStarted) {
                isTypingStarted = true;
                setTimeout(typeWriter, 500); // 0.5 sec delay before typing starts
            }
        }, { threshold: 0.3 });
        letterObserver.observe(document.getElementById('letter'));

        // --- 4. QUIZ LOGIC ---
        const quizData = [
            { question: "If we go on a date, what would we eat?", options: ["Pizza", "Pav Bhaji", "Pasta", "Burger"], answer: "Pav Bhaji" },
            { question: "If we go on a date, where would we roam?", options: ["Shopping Mall", "Garden", "Beach", "Mountains"], answer: "Garden" },
            { question: "Which movie will we prefer to watch?", options: ["Action", "Comedy", "Horror and Romantic", "Sci-Fi"], answer: "Horror and Romantic" },
            { question: "What is the thing that I love the most?", options: ["Sleeping", "Coding", "Eating", "Roasting you"], answer: "Roasting you" },
            { question: "How did we meet?", options: ["School", "Grammer", "Online Game", "College"], answer: "Grammer" }
        ];

        let currentQuestion = 0; let score = 0;
        function loadQuiz() {
            if (currentQuestion >= quizData.length) {
                document.getElementById('quiz-container').style.display = 'none';
                let msg = score === 5 ? "Perfect score! You know me too well! " : `You scored ${score} out of 5!`;
                document.getElementById('quiz-result').innerHTML = `${msg}<br><br>`; return;
            }
            const q = quizData[currentQuestion];
            document.getElementById('question-text').innerText = `${currentQuestion + 1}. ${q.question}`;
            const optionsDiv = document.getElementById('options-container'); optionsDiv.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'quiz-option'; btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.answer); optionsDiv.appendChild(btn);
            });
        }
        function checkAnswer(selected, correct) { if (selected === correct) score++; currentQuestion++; loadQuiz(); }
        loadQuiz(); 

        // --- 5. BOND METER LOGIC ---
        function calculateLove() {
            const n1 = document.getElementById('name1').value.trim(); const res = document.getElementById('loveResult');
            if(!n1) { alert("Please enter your name!"); return; }
            res.style.display = 'block'; res.innerHTML = `100% <br><span style="font-size:1.5rem; color:#e84393; font-family:'Poppins', sans-serif;">An unbreakable bond!</span>`;
        }

        // --- 6. ALBUM LOGIC ---
        const gallery = document.getElementById('photoGallery');
        for (let i = 1; i <= 13; i++) {
            const div = document.createElement('div'); div.className = 'polaroid';
            div.innerHTML = `<img src="${i}.jpg" alt="Memory ${i}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'180\\' height=\\'160\\'><rect width=\\'180\\' height=\\'160\\' fill=\\'%23ffb8c6\\'/><text x=\\'50%\\' y=\\'50%\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' fill=\\'white\\' font-family=\\'sans-serif\\' font-size=\\'20\\'>${i}.jpg</text></svg>'">`;
            gallery.appendChild(div);
        }

        // --- 7. MUSIC PLAYER LOGIC ---
        const playlist = document.getElementById('playlist'); const trackTitle = document.getElementById('current-track-title');
        for (let i = 1; i <= 10; i++) {
            const li = document.createElement('li'); li.innerText = ` Track ${i} (${i}.mp3)`;
            li.onclick = function() {
                document.querySelectorAll('#playlist li').forEach(el => el.classList.remove('playing'));
                this.classList.add('playing'); mainPlayer.src = `${i}.mp3`;
                trackTitle.innerText = `Now Playing: Track ${i}`; mainPlayer.play();
            };
            playlist.appendChild(li);
        }
    </script>
</body>
</html>
