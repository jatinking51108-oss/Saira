<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. BASE STYLES & LUXURY VARIABLES
           ========================================= */
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ffe6ea 100%);
            --text-dark: #4a3340;
            --text-light: #7a5c6b;
            --primary-pink: #ff8fb3;
            --deep-pink: #e84393;
            --gold-accent: #d4af37;
            
            /* Premium Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 15px 35px rgba(232, 67, 147, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
        }

        /* =========================================
           2. FLOATING BACKGROUND ANIMATIONS
           ========================================= */
        .background-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -10%;
            width: 25px; height: 25px;
            background: rgba(255, 184, 198, 0.6);
            transform: rotate(45deg);
            animation: floatUp linear infinite;
            filter: drop-shadow(0 0 10px rgba(255, 143, 179, 0.5));
        }
        
        .floating-heart::before, .floating-heart::after {
            content: '';
            position: absolute;
            width: 25px; height: 25px;
            background: inherit;
            border-radius: 50%;
        }
        .floating-heart::before { top: -12.5px; left: 0; }
        .floating-heart::after { top: 0; left: -12.5px; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(45deg) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(45deg) scale(1.5); opacity: 0; }
        }

        /* =========================================
           3. CINEMATIC WELCOME SCREEN
           ========================================= */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: radial-gradient(circle, #fff0f3 0%, #ffd1dc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
        }
        
        .welcome-title {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: var(--deep-pink);
            text-shadow: 2px 2px 10px rgba(232, 67, 147, 0.3);
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }

        .gift-btn {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-style: italic;
            padding: 18px 50px;
            background: linear-gradient(135deg, #ffffff, #fff0f3);
            color: var(--deep-pink);
            border: 2px solid var(--primary-pink);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 15px 25px rgba(255, 143, 179, 0.4);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .gift-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 35px rgba(232, 67, 147, 0.5);
            color: white;
            background: var(--deep-pink);
            border-color: var(--deep-pink);
        }

        /* =========================================
           4. SMART NAVIGATION & CONTROLS
           ========================================= */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        
        nav::-webkit-scrollbar { display: none; }
        
        @media (min-width: 768px) {
            nav { justify-content: center; gap: 30px; overflow-x: hidden; padding: 20px; }
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 8px 20px;
            border-radius: 30px;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid transparent;
        }

        nav a:hover {
            background: var(--deep-pink);
            color: white;
            border-color: var(--deep-pink);
            box-shadow: 0 5px 15px rgba(232, 67, 147, 0.3);
            transform: translateY(-2px);
        }

        #mute-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--glass-bg);
            border: 2px solid var(--primary-pink);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.6rem;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(232, 67, 147, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mute-btn:hover {
            background: var(--deep-pink);
            color: white;
            transform: scale(1.1) rotate(10deg);
        }

        /* =========================================
           5. GLOBAL SECTION LAYOUT
           ========================================= */
        section {
            min-height: 100vh;
            padding: 120px 20px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h2.section-title {
            font-family: 'Great Vibes', cursive;
            color: var(--deep-pink);
            text-align: center;
            margin-bottom: 40px;
            font-size: 4rem;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 1);
            position: relative;
        }

        .premium-container {
            background: var(--glass-bg);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: var(--glass-shadow);
            max-width: 900px;
            width: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            position: relative;
        }

        @media (min-width: 768px) {
            .premium-container { padding: 60px; }
        }

        /* =========================================
           6. TYPEWRITER LETTER (ADVANCED)
           ========================================= */
        #letter .premium-container {
            max-width: 1000px; /* Made very wide as requested */
            width: 95%;
            background: linear-gradient(to bottom, #ffffff, #fdfbfb);
        }
        
        .letter-paper {
            font-family: 'Poppins', sans-serif;
            font-size: 1.15rem;
            line-height: 2.2;
            white-space: pre-wrap;
            color: var(--text-dark);
            padding: 40px 30px;
            border-radius: 15px;
            position: relative;
            min-height: 500px;
            text-align: left;
            font-weight: 400;
            border-left: 4px solid var(--primary-pink);
            background: repeating-linear-gradient(
                transparent,
                transparent 39px,
                rgba(255, 143, 179, 0.1) 40px
            );
        }

        @media (min-width: 768px) {
            .letter-paper { 
                padding: 50px 60px; 
                font-size: 1.3rem; 
                line-height: 2.4; 
                min-height: 550px;
            }
        }
        
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background-color: var(--deep-pink);
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
            margin-left: 4px;
        }
        
        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0; } 
        }

        /* =========================================
           7. GLOWING JOURNEY MAP
           ========================================= */
        .map-frame {
            width: 100%;
            height: 350px;
            background: linear-gradient(135deg, #f0f8ff, #e6f2ff);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05);
        }
        
        .map-svg { width: 100%; height: 100%; }
        
        .city-label {
            font-weight: 600;
            font-size: 16px;
            fill: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            text-anchor: middle;
        }

        .city-glow {
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { r: 8; fill: var(--deep-pink); filter: drop-shadow(0 0 5px var(--deep-pink)); }
            100% { r: 12; fill: var(--primary-pink); filter: drop-shadow(0 0 15px var(--primary-pink)); }
        }

        .animated-line {
            stroke: var(--deep-pink);
            stroke-width: 4;
            stroke-dasharray: 12px;
            fill: none;
            animation: dashScroll 30s linear infinite;
        }

        @keyframes dashScroll {
            to { stroke-dashoffset: -1000; }
        }

        .plane-icon {
            font-size: 30px;
            offset-path: path('M 150 220 Q 400 30 650 220');
            animation: flyPlane 6s ease-in-out infinite alternate;
            position: absolute;
            top: -15px; left: -15px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
        }

        @keyframes flyPlane {
            0% { offset-distance: 0%; transform: scaleX(1); }
            100% { offset-distance: 100%; transform: scaleX(1); }
        }

        /* =========================================
           8. ADVANCED INTERACTIVE QUIZ
           ========================================= */
        .quiz-question {
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.4rem;
            line-height: 1.6;
            color: var(--text-dark);
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        .quiz-option-btn {
            display: block;
            width: 100%;
            padding: 18px 25px;
            margin: 15px 0;
            background: white;
            color: var(--text-dark);
            border: 2px solid rgba(255, 143, 179, 0.4);
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .quiz-option-btn:hover {
            background: var(--primary-pink);
            color: white;
            border-color: var(--primary-pink);
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(255, 143, 179, 0.3);
        }

        #quiz-result-message {
            margin-top: 30px;
            font-weight: bold;
            font-size: 2rem;
            text-align: center;
            color: var(--deep-pink);
            font-family: 'Great Vibes', cursive;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            display: none;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* =========================================
           9. PREMIUM BOND METER
           ========================================= */
        .meter-input-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .meter-input {
            padding: 18px;
            border: 2px solid var(--primary-pink);
            border-radius: 15px;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            background: rgba(255,255,255,0.9);
            width: 100%;
            max-width: 300px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }
        
        .meter-input:focus {
            box-shadow: 0 0 15px rgba(255, 143, 179, 0.5);
        }

        .calculate-btn {
            padding: 15px 40px;
            background: linear-gradient(45deg, var(--deep-pink), var(--primary-pink));
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(232, 67, 147, 0.3);
            width: 100%;
            max-width: 250px;
        }

        .calculate-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(232, 67, 147, 0.5);
        }

        .love-score {
            font-size: 5rem;
            text-align: center;
            margin-top: 30px;
            display: none;
            color: var(--deep-pink);
            font-family: 'Great Vibes', cursive;
            animation: heavyHeartbeat 1.5s infinite;
        }

        @keyframes heavyHeartbeat {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(232, 67, 147, 0.3); }
            15% { transform: scale(1.15); text-shadow: 0 0 20px rgba(232, 67, 147, 0.6); }
            30% { transform: scale(1); text-shadow: 0 0 10px rgba(232, 67, 147, 0.3); }
            45% { transform: scale(1.15); text-shadow: 0 0 20px rgba(232, 67, 147, 0.6); }
            100% { transform: scale(1); text-shadow: 0 0 10px rgba(232, 67, 147, 0.3); }
        }

        /* =========================================
           10. LUXURY PHOTO GALLERY
           ========================================= */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .photo-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; }
        }

        .polaroid-card {
            background: white;
            padding: 12px 12px 35px 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-radius: 8px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .polaroid-card:nth-child(even) { transform: rotate(4deg); }
        .polaroid-card:nth-child(odd) { transform: rotate(-4deg); }

        .polaroid-card:hover {
            transform: scale(1.15) rotate(0deg);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(232, 67, 147, 0.4);
        }

        .polaroid-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #ffe4e1;
        }
        
        @media (min-width: 768px) {
            .polaroid-img { height: 220px; }
        }

        /* =========================================
           11. APP-LIKE MUSIC PLAYER
           ========================================= */
        .music-app-ui {
            background: linear-gradient(to bottom, #ffffff, #fafafa);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .now-playing-info {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .now-playing-title {
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .custom-audio-element {
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            border-radius: 50px;
        }

        .playlist-container {
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 15px;
            padding: 10px;
            background: rgba(255, 240, 243, 0.5);
            border: 1px solid rgba(255, 143, 179, 0.2);
        }

        .playlist-item {
            list-style: none;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .playlist-item::before {
            content: '🎵';
            margin-right: 15px;
            opacity: 0.5;
        }

        .playlist-item:hover {
            background: rgba(255, 143, 179, 0.2);
            transform: translateX(5px);
        }

        .playlist-item.active-track {
            background: var(--deep-pink);
            color: white;
            box-shadow: 0 4px 15px rgba(232, 67, 147, 0.3);
        }
        
        .playlist-item.active-track::before {
            content: '🎶';
            opacity: 1;
            animation: bounceNote 1s infinite alternate;
        }
        
        @keyframes bounceNote {
            from { transform: translateY(0); }
            to { transform: translateY(-3px); }
        }

        /* Custom Scrollbar for Playlist */
        .playlist-container::-webkit-scrollbar { width: 8px; }
        .playlist-container::-webkit-scrollbar-track { background: transparent; }
        .playlist-container::-webkit-scrollbar-thumb { background: var(--primary-pink); border-radius: 10px; }

    </style>
</head>
<body>

    <audio id="global-bg-music" src="2.mp3" loop preload="auto"></audio>

    <div id="welcome-screen">
        <h1 class="welcome-title">A Special Gift For You</h1>
        <button class="gift-btn" onclick="unlockExperience()">Open Your Gift 🎁</button>
    </div>

    <button id="mute-btn" onclick="toggleGlobalMute()" title="Toggle Background Music">🔊</button>

    <div class="background-animation" id="animation-container">
        </div>

    <nav>
        <a href="#section-letter">💌 Letter</a>
        <a href="#section-map">🗺️ Journey</a>
        <a href="#section-quiz">🧠 Quiz</a>
        <a href="#section-meter">💖 Bond</a>
        <a href="#section-album">📸 Memories</a>
        <a href="#section-music">🎵 Music</a>
    </nav>

    <section id="section-letter">
        <h2 class="section-title">A Special Note...</h2>
        <div class="premium-container">
            <div class="letter-paper" id="typewriter-text-box"></div>
        </div>
    </section>

    <section id="section-map">
        <h2 class="section-title">Our Journey</h2>
        <div class="premium-container">
            <p style="text-align: center; margin-bottom: 25px; color: var(--text-light); font-size: 1.1rem; font-style: italic;">
                "Distance means so little when someone means so much."
            </p>
            <div class="map-frame">
                <svg viewBox="0 0 800 400" class="map-svg" preserveAspectRatio="xMidYMid meet">
                    <path d="M 150 220 Q 400 30 650 220" class="animated-line" />
                    
                    <circle cx="150" cy="220" r="10" class="city-glow" />
                    <text x="150" y="260" class="city-label">Ahmedabad</text>
                    
                    <circle cx="650" cy="220" r="10" class="city-glow" />
                    <text x="650" y="260" class="city-label">Patna</text>
                </svg>
                <div class="plane-icon">✈️</div>
            </div>
        </div>
    </section>

    <section id="section-quiz">
        <h2 class="section-title">How Well Do You Know Me?</h2>
        <div class="premium-container">
            <div id="quiz-ui-container">
                <h3 id="quiz-question-display" class="quiz-question"></h3>
                <div id="quiz-options-wrapper">
                    </div>
            </div>
            <div id="quiz-result-message"></div>
        </div>
    </section>

    <section id="section-meter">
        <h2 class="section-title">Our Bond Meter</h2>
        <div class="premium-container">
            <div class="meter-input-group">
                <input type="text" id="input-your-name" class="meter-input" placeholder="Enter Your Name" autocomplete="off" />
                <input type="text" id="input-my-name" class="meter-input" value="Jatin" readonly style="background: #f5f5f5; color: #888; cursor: not-allowed;" />
            </div>
            <div style="text-align: center;">
                <button class="calculate-btn" onclick="runBondCalculation()">Calculate Bond</button>
            </div>
            <div class="love-score" id="bond-score-display"></div>
        </div>
    </section>

    <section id="section-album">
        <h2 class="section-title">Beautiful Memories</h2>
        <div class="premium-container" style="max-width: 1100px;">
            <div class="photo-grid" id="photo-gallery-grid">
                </div>
        </div>
    </section>

    <section id="section-music">
        <h2 class="section-title">Your Playlist</h2>
        <div class="premium-container">
            <div class="music-app-ui">
                <div class="now-playing-info">
                    <h3 id="current-song-title" class="now-playing-title">Select a song below to start...</h3>
                </div>
                
                <audio id="main-audio-player" class="custom-audio-element" controls>
                    Your browser does not support the audio element.
                </audio>
                
                <ul class="playlist-container" id="playlist-list">
                    </ul>
            </div>
        </div>
    </section>

    <script>
        /**
         * 1. BACKGROUND FLOATING HEARTS SYSTEM
         * Generates animated hearts that float up the screen constantly.
         */
        function initializeBackground() {
            const container = document.getElementById('animation-container');
            const numberOfHearts = 20;

            for (let i = 0; i < numberOfHearts; i++) {
                let heart = document.createElement('div');
                heart.className = 'floating-heart';
                
                // Randomize horizontal position (0vw to 100vw)
                heart.style.left = Math.random() * 100 + 'vw';
                
                // Randomize animation duration (8s to 18s) to make it look natural
                heart.style.animationDuration = (Math.random() * 10 + 8) + 's';
                
                // Randomize start delay so they don't all appear at once
                heart.style.animationDelay = Math.random() * 10 + 's';
                
                container.appendChild(heart);
            }
        }
        initializeBackground();

        /**
         * 2. AUDIO MANAGEMENT SYSTEM
         * Handles the background music vs the playlist music interactions.
         */
        const bgMusic = document.getElementById('global-bg-music');
        const playlistPlayer = document.getElementById('main-audio-player');
        const muteButton = document.getElementById('mute-btn');
        const welcomeScreen = document.getElementById('welcome-screen');
        
        let userHasMutedBackground = false;

        // Called when user clicks "Open Your Gift"
        function unlockExperience() {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => { 
                welcomeScreen.style.display = 'none'; 
            }, 1500);
            
            // Start the background music
            bgMusic.play().catch(error => {
                console.log("Audio autoplay was blocked by the browser.", error);
            });
        }

        // Handles the floating mute button in the bottom right
        function toggleGlobalMute() {
            if (bgMusic.paused) {
                bgMusic.play();
                userHasMutedBackground = false;
                muteButton.innerHTML = '🔊';
            } else {
                bgMusic.pause();
                userHasMutedBackground = true;
                muteButton.innerHTML = '🔇';
            }
        }

        // SMART FEATURE: When the user plays a song from the playlist, 
        // automatically pause the background music so they don't overlap.
        playlistPlayer.addEventListener('play', () => {
            if (!bgMusic.paused) {
                bgMusic.pause();
                muteButton.innerHTML = '🔇';
            }
        });

        // SMART FEATURE: When the playlist song is paused or finishes,
        // resume the background music (UNLESS the user manually muted it earlier).
        playlistPlayer.addEventListener('pause', () => {
            if (!userHasMutedBackground) {
                bgMusic.play();
                muteButton.innerHTML = '🔊';
            }
        });
        
        playlistPlayer.addEventListener('ended', () => {
            if (!userHasMutedBackground) {
                bgMusic.play();
                muteButton.innerHTML = '🔊';
            }
        });

        /**
         * 3. ADVANCED TYPEWRITER SYSTEM
         * Types the letter at human speeds, pausing at punctuation.
         */
        const fullLetterText = `Hey beta, happiest birthday! 💖\n\nIt's me, your Jatin.\n\nLove you soo soo soo much! You are so incredibly special to me. The distance between Ahmedabad and Patna is just a physical barrier, because in my heart, you are always right here with me. Sending you lots of love and the warmest hugs from afar.\n\nTere aane se meri zindagi mein jo raunak aayi hai, use shabdon mein bayaan karna mushkil hai. Tum mere din ka wo hissa ho jiske bina mera har din adhoora lagta hai.\n\nNo matter how much we fight or how much I love roasting you, you mean the absolute world to me. You are my constant, my favorite person, and the most beautiful soul I know.\n\nDua hai ki tumhare chehre ki yeh pyari si muskurahat kabhi kam na ho, aur tumhare saare sapne poore hon. Rab kare tumhein duniya ki saari khushiyan milen.\n\nEnjoy your special day to the fullest. I am always there for you, today and forever. 🎂🎈`;

        const letterBox = document.getElementById('typewriter-text-box');
        let currentCharIndex = 0;
        let hasTypingStarted = false;

        function runTypewriter() {
            if (currentCharIndex < fullLetterText.length) {
                let char = fullLetterText.charAt(currentCharIndex);
                
                // Handle line breaks correctly in HTML
                if (char === '\n') {
                    letterBox.innerHTML += '<br>';
                } else {
                    letterBox.innerHTML += char;
                }
                
                currentCharIndex++;
                
                // Calculate human-like typing speed
                // Normal letters type fast (20ms - 60ms)
                let currentSpeed = Math.random() * 40 + 20; 
                
                // Pause longer at punctuation marks (200ms - 500ms)
                if (char === '.' || char === ',' || char === '!' || char === '\n') {
                    currentSpeed = Math.random() * 300 + 200; 
                }
                
                setTimeout(runTypewriter, currentSpeed);
            } else {
                // When finished, keep the blinking cursor
                letterBox.innerHTML += '<span class="cursor"></span>';
            }
        }

        // Intersection Observer: Only start typing when the user scrolls down to see the letter
        const observerOptions = { threshold: 0.3 };
        const letterObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !hasTypingStarted) {
                hasTypingStarted = true;
                // Add a small delay before starting to type
                setTimeout(runTypewriter, 800); 
            }
        }, observerOptions);
        
        letterObserver.observe(document.getElementById('section-letter'));

        /**
         * 4. INTERACTIVE QUIZ SYSTEM
         * Loads questions dynamically and tracks the score.
         */
        const exactQuizData = [
            { 
                question: "If we go on a date, what would we eat?", 
                options: ["Pizza", "Pav Bhaji", "Pasta", "Burger"], 
                correctAnswer: "Pav Bhaji" 
            },
            { 
                question: "If we go on a date, where would we roam?", 
                options: ["Shopping Mall", "Garden", "Beach", "Mountains"], 
                correctAnswer: "Garden" 
            },
            { 
                question: "Which movie will we prefer to watch?", 
                options: ["Action", "Comedy", "Horror and Romantic", "Sci-Fi"], 
                correctAnswer: "Horror and Romantic" 
            },
            { 
                question: "What is the thing that I love the most?", 
                options: ["Sleeping", "Coding", "Eating", "Roasting you"], 
                correctAnswer: "Roasting you" 
            },
            { 
                question: "How did we meet?", 
                options: ["School", "Grammer", "Online Game", "College"], 
                correctAnswer: "Grammer" 
            }
        ];

        let activeQuestionIndex = 0; 
        let currentScore = 0;
        
        const questionDisplay = document.getElementById('quiz-question-display');
        const optionsWrapper = document.getElementById('quiz-options-wrapper');
        const quizContainerUI = document.getElementById('quiz-ui-container');
        const resultMessage = document.getElementById('quiz-result-message');

        function renderNextQuestion() {
            // Check if quiz is finished
            if (activeQuestionIndex >= exactQuizData.length) {
                quizContainerUI.style.display = 'none';
                
                let finalMessage = "";
                if (currentScore === 5) {
                    finalMessage = "Perfect score! You know me too well! 💖";
                } else {
                    finalMessage = `You scored ${currentScore} out of 5!`;
                }
                
                resultMessage.style.display = 'block';
                resultMessage.innerHTML = `${finalMessage}<br><br>🎉`; 
                return;
            }
            
            // Load current question
            const currentQ = exactQuizData[activeQuestionIndex];
            questionDisplay.innerText = `Q${activeQuestionIndex + 1}: ${currentQ.question}`;
            
            // Clear old options
            optionsWrapper.innerHTML = '';
            
            // Generate buttons for options
            currentQ.options.forEach(optionText => {
                const button = document.createElement('button');
                button.className = 'quiz-option-btn';
                button.innerText = optionText;
                
                button.onclick = function() {
                    evaluateAnswer(optionText, currentQ.correctAnswer);
                };
                
                optionsWrapper.appendChild(button);
            });
        }

        function evaluateAnswer(selectedAnswer, actualCorrectAnswer) {
            if (selectedAnswer === actualCorrectAnswer) {
                currentScore++;
            }
            activeQuestionIndex++;
            renderNextQuestion(); 
        }
        
        // Initialize the first question
        renderNextQuestion(); 

        /**
         * 5. BOND METER SYSTEM
         * Calculates a "fixed" perfect score for the birthday.
         */
        function runBondCalculation() {
            const userNameInput = document.getElementById('input-your-name').value.trim(); 
            const displayScore = document.getElementById('bond-score-display');
            
            if (userNameInput === "") { 
                alert("Please enter your name first!"); 
                return; 
            }
            
            // Fixed outcome to make it special
            displayScore.style.display = 'block'; 
            displayScore.innerHTML = `100% 💖<br><span style="font-size:1.8rem; color:#e84393; font-family:'Poppins', sans-serif; font-weight:600; display:block; margin-top:10px;">An unbreakable bond!</span>`;
        }

        /**
         * 6. PHOTO ALBUM INJECTION
         * Dynamically creates 13 polaroid elements for 1.jpg through 13.jpg
         */
        function buildPhotoGallery() {
            const galleryContainer = document.getElementById('photo-gallery-grid');
            
            // The user requested exactly 13 photos
            for (let i = 1; i <= 13; i++) {
                const polaroidWrapper = document.createElement('div'); 
                polaroidWrapper.className = 'polaroid-card';
                
                // The onerror attribute ensures that if a photo is missing in the folder, 
                // it falls back to a pretty pink placeholder showing the filename.
                const imageHTML = `
                    <img 
                        src="${i}.jpg" 
                        class="polaroid-img"
                        alt="Beautiful Memory ${i}" 
                        onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'200\\' height=\\'200\\'><rect width=\\'200\\' height=\\'200\\' fill=\\'%23ffb8c6\\'/><text x=\\'50%\\' y=\\'50%\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' fill=\\'white\\' font-family=\\'sans-serif\\' font-size=\\'24\\' font-weight=\\'bold\\'>${i}.jpg</text></svg>'"
                    >`;
                    
                polaroidWrapper.innerHTML = imageHTML;
                galleryContainer.appendChild(polaroidWrapper);
            }
        }
        buildPhotoGallery();

        /**
         * 7. MUSIC PLAYLIST INJECTION
         * Dynamically creates the playlist for 1.mp3 through 10.mp3
         */
        function buildMusicPlaylist() {
            const playlistContainer = document.getElementById('playlist-list'); 
            const currentTitleDisplay = document.getElementById('current-song-title');
            
            // The user requested exactly 10 songs
            for (let i = 1; i <= 10; i++) {
                const trackItem = document.createElement('li'); 
                trackItem.className = 'playlist-item';
                trackItem.innerText = `Track ${i} (${i}.mp3)`;
                
                trackItem.onclick = function() {
                    // Remove active styling from all tracks
                    const allTracks = document.querySelectorAll('.playlist-item');
                    allTracks.forEach(element => {
                        element.classList.remove('active-track');
                    });
                    
                    // Add active styling to the clicked track
                    this.classList.add('active-track'); 
                    
                    // Update the audio source and play
                    playlistPlayer.src = `${i}.mp3`;
                    currentTitleDisplay.innerText = `Now Playing: Track ${i} 🎶`; 
                    playlistPlayer.play();
                };
                
                playlistContainer.appendChild(trackItem);
            }
        }
        buildMusicPlaylist();

    </script>
</body>
